# Node: edge  — trust zone: DMZ
# Services: Nginx+ModSecurity WAF, Kong Gateway, Webhook Authorizer, mTLS proxies

services:
  edge-nginx:
    build:
      context: ../../core
      dockerfile: nginx/Dockerfile
    container_name: edge-nginx
    ports:
      - "8888:8080"
      - "8444:8443"
    environment:
      BACKEND: http://kong:8000
      MODSEC_RULE_ENGINE: On
      PORT: 8080
      SSL_PORT: 8443
      SERVER_NAME: localhost
    volumes:
      - ../../core/certs/server.crt:/etc/nginx/conf/server.crt:ro
      - ../../core/certs/server.key:/etc/nginx/conf/server.key:ro
      - ../../core/nginx/modsecurity-custom.conf:/etc/modsecurity.d/owasp-crs/rules/REQUEST-900-EXCLUSION-RULES-BEFORE-CRS.conf:ro
      - ../../core/nginx/nginx.conf:/etc/nginx/conf.d/security-headers.conf:ro
    depends_on:
      - kong
    networks:
      - shopflow_dmz

  kong:
    image: kong:3.7
    container_name: kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_JWT_AUD: ${KEYCLOAK_AUDIENCE:-shopflow-api}
    volumes:
      - ../../core/kong/kong.yml:/etc/kong/kong.yml:ro
    ports:
      - "127.0.0.1:8001:8001"
    networks:
      - shopflow_dmz
      - shopflow_private

  webhook-authorizer:
    build:
      context: ../../services
      dockerfile: webhook-authorizer/Dockerfile
    container_name: webhook-authorizer
    environment:
      PORT: 8080
      BILLING_INTERNAL_URL: http://billing-service:8080
      WEBHOOK_INTERNAL_SECRET: ${WEBHOOK_INTERNAL_SECRET:-lab-webhook-internal-secret-change-me}
      HMAC_SECRET: ${HMAC_SECRET:-lab-hmac-secret-change-me}
      VAULT_ADDR: ${VAULT_ADDR:-http://vault:8200}
      NODE_EXTRA_CA_CERTS: ${NODE_EXTRA_CA_CERTS:-}
      VAULT_TOKEN: ${VAULT_APP_TOKEN:-${VAULT_ROOT_TOKEN:-}}
      VAULT_REQUIRED: ${VAULT_REQUIRED:-false}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      SHOPFLOW_ENV: ${SHOPFLOW_ENV:-lab}
    volumes:
      - ../../core/certs:/certs:ro
    networks:
      - shopflow_private

  internal-mtls-proxy:
    image: nginx:1.27-alpine
    container_name: internal-mtls-proxy
    ports:
      - "9443:9443"
    volumes:
      - ../../core/nginx/internal-mtls.conf:/etc/nginx/conf.d/default.conf:ro
      - ../../core/certs:/etc/nginx/certs:ro
    networks:
      - shopflow_dmz
      - shopflow_private

  billing-mtls-proxy:
    image: nginx:1.27-alpine
    container_name: billing-mtls-proxy
    ports:
      - "8443:443"
    volumes:
      - ../../core/nginx/billing-mtls.conf:/etc/nginx/conf.d/default.conf:ro
      - ../../core/certs:/etc/nginx/certs:ro
    networks:
      - shopflow_dmz
      - shopflow_private

networks:
  shopflow_dmz:
    external: true
  shopflow_private:
    external: true
