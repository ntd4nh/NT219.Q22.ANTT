# Node: edge  — trust zone: DMZ
# Services: Nginx+ModSecurity WAF, Kong Gateway, mTLS proxies
# Startup order: last (after app nodes + security + identity are healthy)
# Usage: docker compose -p shopflow-edge --env-file ../../core/.env up -d

services:
  edge-nginx:
    build:
      context: ../../core
      dockerfile: nginx/Dockerfile
    container_name: edge-nginx
    ports:
      - "80:8080"
      - "443:8443"
    environment:
      BACKEND: http://kong:8000
      MODSEC_RULE_ENGINE: On
      PORT: 8080
      SSL_PORT: 8443
      SERVER_NAME: localhost
    volumes:
      - ../../core/certs/server.crt:/etc/nginx/conf/server.crt:ro
      - ../../core/certs/server.key:/etc/nginx/conf/server.key:ro
      - ../../core/nginx/modsecurity-custom.conf:/etc/modsecurity.d/owasp-crs/rules/REQUEST-900-EXCLUSION-RULES-BEFORE-CRS.conf:ro
    depends_on:
      - kong
    networks:
      - shopflow_dmz

  kong:
    image: kong:3.7
    container_name: kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    volumes:
      - ../../core/kong/kong.yml:/etc/kong/kong.yml:ro
    ports:
      - "127.0.0.1:8001:8001"
    networks:
      - shopflow_dmz
      - shopflow_private

  internal-mtls-proxy:
    image: nginx:1.27-alpine
    container_name: internal-mtls-proxy
    ports:
      - "9443:9443"
    volumes:
      - ../../core/nginx/internal-mtls.conf:/etc/nginx/conf.d/default.conf:ro
      - ../../core/certs:/etc/nginx/certs:ro
    networks:
      - shopflow_dmz
      - shopflow_private

  billing-mtls-proxy:
    image: nginx:1.27-alpine
    container_name: billing-mtls-proxy
    ports:
      - "8443:443"
    volumes:
      - ../../core/nginx/billing-mtls.conf:/etc/nginx/conf.d/default.conf:ro
      - ../../core/certs:/etc/nginx/certs:ro
    networks:
      - shopflow_dmz
      - shopflow_private

networks:
  shopflow_dmz:
    external: true
  shopflow_private:
    external: true
