# Node: obs  — trust zone: Operations Zone
# Services: Prometheus, Loki, Promtail, Grafana
# Startup order: any (scrapes existing services; no other node depends on it)
# Usage: docker compose -p shopflow-obs --env-file ../../core/.env up -d

services:
  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ../../core/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    networks:
      - shopflow_private

  promtail:
    image: grafana/promtail:3.0.0
    container_name: promtail
    volumes:
      - ../../core/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - shopflow_private

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ../../core/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../core/observability/alerts.yml:/etc/prometheus/alerts.yml:ro
      - ../../core/observability/recording_rules.yml:/etc/prometheus/recording_rules.yml:ro
    ports:
      - "9090:9090"
    networks:
      - shopflow_private

  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
    volumes:
      - ../../core/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../core/observability/grafana/dashboards:/etc/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - shopflow_private

volumes:
  loki-data:

networks:
  shopflow_private:
    external: true
