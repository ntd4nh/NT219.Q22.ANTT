# Node: data  — trust zone: Data Zone
# DB password must match Vault secret/data/db-credentials (see core/vault/init-dev.ps1)

services:
  app-db:
    image: postgres:16-alpine
    container_name: app-db
    environment:
      POSTGRES_DB: shopflow
      POSTGRES_USER: shopflow_app
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in core/.env — must match Vault db-credentials}
    volumes:
      - ../../core/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - app-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopflow_app -d shopflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - shopflow_data

volumes:
  app-db-data:

networks:
  shopflow_data:
    external: true
