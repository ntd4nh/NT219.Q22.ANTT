# Node: app-a  — trust zone: App Private Subnet
# Services: user-service, order-service
# Startup order: 4th — after node-data (app-db), node-security (redis/opa), node-identity (keycloak)
# Usage: docker compose -p shopflow-app-a --env-file ../../core/.env up -d

services:
  user-service:
    build:
      context: ../../services
      dockerfile: user-service/Dockerfile
    container_name: user-service
    environment:
      PORT: 8080
      KEYCLOAK_ISSUERS: http://keycloak:8080/realms/shopflow,http://localhost:8080/realms/shopflow
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/shopflow/protocol/openid-connect/certs
      SSRF_ALLOWLIST: cdn.shopflow.local,imgur.com
      REDIS_URL: redis://redis:6379
      OPA_URL: http://opa:8181
      OPA_ENABLED: ${OPA_ENABLED:-true}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE:-shopflow-api}
      KEYCLOAK_M2M_CLIENT_ID: ${KEYCLOAK_M2M_CLIENT_ID:-shopflow-s2s}
      KEYCLOAK_M2M_CLIENT_SECRET: ${KEYCLOAK_M2M_CLIENT_SECRET:-shopflow-s2s-secret-change-in-prod}
      SHOPFLOW_ENV: ${SHOPFLOW_ENV:-lab}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shopflow_private

  order-service:
    build:
      context: ../../services
      dockerfile: order-service/Dockerfile
    container_name: order-service
    environment:
      PORT: 8080
      DATABASE_URL: postgres://shopflow_app:shopflow_app@app-db:5432/shopflow
      KEYCLOAK_ISSUERS: http://keycloak:8080/realms/shopflow,http://localhost:8080/realms/shopflow
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/shopflow/protocol/openid-connect/certs
      TENANT_RATE_LIMIT_RPM: ${TENANT_RATE_LIMIT_RPM:-120}
      REDIS_URL: redis://redis:6379
      OPA_URL: http://opa:8181
      OPA_ENABLED: ${OPA_ENABLED:-true}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE:-shopflow-api}
      KEYCLOAK_M2M_CLIENT_ID: ${KEYCLOAK_M2M_CLIENT_ID:-shopflow-s2s}
      KEYCLOAK_M2M_CLIENT_SECRET: ${KEYCLOAK_M2M_CLIENT_SECRET:-shopflow-s2s-secret-change-in-prod}
      KEYCLOAK_M2M_SCOPE: ${KEYCLOAK_M2M_SCOPE:-shopflow-api}
      KEYCLOAK_TOKEN_URL: http://keycloak:8080/realms/shopflow/protocol/openid-connect/token
      USER_INTERNAL_URL: http://user-service:8080
      SHOPFLOW_ENV: ${SHOPFLOW_ENV:-lab}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shopflow_private

networks:
  shopflow_private:
    external: true
