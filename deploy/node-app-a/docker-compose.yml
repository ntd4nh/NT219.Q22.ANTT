# Node: app-a  — trust zone: App Private Subnet
# Services: user-service, order-service

services:
  user-service:
    build:
      context: ../../services
      dockerfile: user-service/Dockerfile
    container_name: user-service
    environment:
      PORT: 8080
      KEYCLOAK_ISSUERS: ${KEYCLOAK_ISSUERS:-http://keycloak:8080/realms/shopflow,http://localhost:8080/realms/shopflow}
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/shopflow/protocol/openid-connect/certs
      SSRF_ALLOWLIST: cdn.shopflow.local,imgur.com
      REDIS_URL: redis://redis:6379
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE:-shopflow-api}
      KEYCLOAK_M2M_CLIENT_ID: ${KEYCLOAK_M2M_CLIENT_ID:-shopflow-s2s}
      KEYCLOAK_M2M_CLIENT_SECRET: ${KEYCLOAK_M2M_CLIENT_SECRET:-shopflow-s2s-secret-change-in-prod}
      SHOPFLOW_ENV: ${SHOPFLOW_ENV:-lab}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shopflow_private

  order-service:
    build:
      context: ../../services
      dockerfile: order-service/Dockerfile
    container_name: order-service
    environment:
      PORT: 8080
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_APP_TOKEN:-${VAULT_ROOT_TOKEN:-}}
      VAULT_DB_REQUIRED: ${VAULT_DB_REQUIRED:-false}
      DB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in core/.env}
      KEYCLOAK_ISSUERS: ${KEYCLOAK_ISSUERS:-http://keycloak:8080/realms/shopflow,http://localhost:8080/realms/shopflow}
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/shopflow/protocol/openid-connect/certs
      TENANT_RATE_LIMIT_RPM: ${TENANT_RATE_LIMIT_RPM:-120}
      REDIS_URL: redis://redis:6379
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE:-shopflow-api}
      KEYCLOAK_M2M_CLIENT_ID: ${KEYCLOAK_M2M_CLIENT_ID:-shopflow-s2s}
      KEYCLOAK_M2M_CLIENT_SECRET: ${KEYCLOAK_M2M_CLIENT_SECRET:-shopflow-s2s-secret-change-in-prod}
      KEYCLOAK_M2M_SCOPE: ${KEYCLOAK_M2M_SCOPE:-shopflow-api}
      KEYCLOAK_TOKEN_URL: http://keycloak:8080/realms/shopflow/protocol/openid-connect/token
      USER_INTERNAL_URL: http://user-service:8080
      SHOPFLOW_ENV: ${SHOPFLOW_ENV:-lab}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shopflow_private
      - shopflow_data

  backend-tls-proxy:
    image: nginx:1.27-alpine
    container_name: backend-tls-proxy
    ports:
      - "8446:8446"
    volumes:
      - ../../core/nginx/backend-tls.conf:/etc/nginx/conf.d/default.conf:ro
      - ../../core/certs:/etc/nginx/certs:ro
    depends_on:
      - order-service
      - user-service
    networks:
      - shopflow_private

networks:
  shopflow_private:
    external: true
  shopflow_data:
    external: true
