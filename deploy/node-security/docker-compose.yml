# Node: security  — trust zone: Security Zone
# Services: Vault OSS (Transit + KV), Redis (rate-limit + replay cache)

services:
  redis:
    image: redis:7-alpine
    container_name: redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - shopflow_private

  vault:
    image: hashicorp/vault:1.18
    container_name: vault
    entrypoint: ["vault"]
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_ADDR: http://127.0.0.1:8200
      VAULT_API_ADDR: http://vault:8200
    command: ["server", "-config=/vault/config/config.hcl"]
    ports:
      - "8200:8200"
    volumes:
      - ../../core/vault/config.hcl:/vault/config/config.hcl:ro
      - vault-data:/vault/file
    healthcheck:
      test: ["CMD", "sh", "-c", "vault status -address=http://127.0.0.1:8200"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shopflow_private

volumes:
  redis-data:
  vault-data:

networks:
  shopflow_private:
    external: true
