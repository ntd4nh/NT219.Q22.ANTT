version: "3.9"

services:
  # ──────────────────────────────────────────────
  # Identity Provider – Keycloak
  # ──────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-keycloak}
    ports:
      - "8080:8080"
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - backend

  keycloak-db:
    image: postgres:16-alpine
    container_name: keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD:-keycloak}
    volumes:
      - keycloak_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ──────────────────────────────────────────────
  # API Gateway – Kong
  # ──────────────────────────────────────────────
  kong-db:
    image: postgres:16-alpine
    container_name: kong-db
    environment:
      POSTGRES_DB: kong
      POSTGRES_USER: kong
      POSTGRES_PASSWORD: ${KONG_DB_PASSWORD:-kong}
    volumes:
      - kong_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kong"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  kong-migration:
    image: kong:3.6
    container_name: kong-migration
    command: kong migrations bootstrap
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: ${KONG_DB_PASSWORD:-kong}
    depends_on:
      kong-db:
        condition: service_healthy
    networks:
      - backend

  kong:
    image: kong:3.6
    container_name: kong
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: ${KONG_DB_PASSWORD:-kong}
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    ports:
      - "8000:8000"   # Proxy
      - "8443:8443"   # Proxy SSL
      - "8001:8001"   # Admin API
    depends_on:
      kong-migration:
        condition: service_completed_successfully
    networks:
      - backend

  # ──────────────────────────────────────────────
  # Application Database – PostgreSQL
  # ──────────────────────────────────────────────
  app-db:
    image: postgres:16-alpine
    container_name: app-db
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: ${APP_DB_PASSWORD:-apppassword}
    volumes:
      - app_data:/var/lib/postgresql/data
      - ./config/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    networks:
      - backend

  # ──────────────────────────────────────────────
  # Backend Services – FastAPI
  # ──────────────────────────────────────────────
  user-service:
    build:
      context: ./src/services/user-service
      dockerfile: Dockerfile
    container_name: user-service
    environment:
      DATABASE_URL: postgresql+asyncpg://appuser:${APP_DB_PASSWORD:-apppassword}@app-db:5432/appdb
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-app-realm}
    depends_on:
      app-db:
        condition: service_healthy
    networks:
      - backend

  order-service:
    build:
      context: ./src/services/order-service
      dockerfile: Dockerfile
    container_name: order-service
    environment:
      DATABASE_URL: postgresql+asyncpg://appuser:${APP_DB_PASSWORD:-apppassword}@app-db:5432/appdb
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-app-realm}
    depends_on:
      app-db:
        condition: service_healthy
    networks:
      - backend

  webhook-service:
    build:
      context: ./src/services/webhook-service
      dockerfile: Dockerfile
    container_name: webhook-service
    environment:
      DATABASE_URL: postgresql+asyncpg://appuser:${APP_DB_PASSWORD:-apppassword}@app-db:5432/appdb
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-changeme}
    depends_on:
      app-db:
        condition: service_healthy
    networks:
      - backend

  # ──────────────────────────────────────────────
  # Observability – Grafana + Loki
  # ──────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./config/loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    networks:
      - backend

  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - loki
    networks:
      - backend

  # ──────────────────────────────────────────────
  # Secrets Management – Vault
  # ──────────────────────────────────────────────
  vault:
    image: hashicorp/vault:1.15
    container_name: vault
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_TOKEN:-myroot}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "8200:8200"
    networks:
      - backend

volumes:
  keycloak_data:
  kong_data:
  app_data:
  loki_data:
  grafana_data:

networks:
  backend:
    driver: bridge
