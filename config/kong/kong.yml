# ──────────────────────────────────────────────
# Kong Declarative Configuration (for reference)
# Apply via Admin API or Kong decK
# ──────────────────────────────────────────────
_format_version: "3.0"

services:
  - name: user-service
    url: http://user-service:8000
    routes:
      - name: user-routes
        paths:
          - /api/v1/users
        strip_path: false

  - name: order-service
    url: http://order-service:8000
    routes:
      - name: order-routes
        paths:
          - /api/v1/orders
        strip_path: false

  - name: webhook-service
    url: http://webhook-service:8000
    routes:
      - name: webhook-routes
        paths:
          - /api/v1/webhooks
        strip_path: false

plugins:
  - name: rate-limiting
    config:
      minute: 60
      policy: local

  - name: jwt
    config:
      uri_param_names:
        - jwt

  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - PATCH
        - OPTIONS
      headers:
        - Authorization
        - Content-Type
      max_age: 3600
