_format_version: "3.0"

services:
  - name: order-service
    url: http://order-service:8080
    routes:
      - name: order-route
        paths: ["/api/orders"]
        strip_path: false
    plugins:
      - name: correlation-id
        config:
          header_name: X-Correlation-Id
          generator: uuid
          echo_downstream: true
      - name: rate-limiting
        config:
          minute: 200
          policy: local

  - name: user-service
    url: http://user-service:8080
    routes:
      - name: user-route
        paths: ["/api/users"]
        strip_path: false
    plugins:
      - name: correlation-id
        config:
          header_name: X-Correlation-Id
          generator: uuid
          echo_downstream: true
      - name: rate-limiting
        config:
          minute: 150
          policy: local

  - name: billing-service
    url: http://billing-service:8080
    routes:
      - name: billing-route
        paths: ["/api/billing"]
        strip_path: false
    plugins:
      - name: correlation-id
        config:
          header_name: X-Correlation-Id
          generator: uuid
          echo_downstream: true
      - name: rate-limiting
        config:
          minute: 60
          policy: local

  - name: auth-service
    url: http://auth-service:8080
    routes:
      - name: auth-route
        paths: ["/api/auth"]
        strip_path: false
    plugins:
      - name: correlation-id
        config:
          header_name: X-Correlation-Id
          generator: uuid
          echo_downstream: true
      - name: rate-limiting
        config:
          minute: 30
          policy: local

plugins:
  - name: rate-limiting
    config:
      minute: 300
      policy: local
  - name: request-size-limiting
    config:
      allowed_payload_size: 2
