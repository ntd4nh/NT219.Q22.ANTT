_format_version: "3.0"

services:
  - name: order-service
    url: http://order-service:8080
    routes:
      - name: order-route
        paths:
          - /api/orders
        strip_path: false
  - name: user-service
    url: http://user-service:8080
    routes:
      - name: user-route
        paths:
          - /api/users
        strip_path: false
  - name: billing-service
    url: http://billing-service:8080
    routes:
      - name: billing-route
        paths:
          - /api/billing
        strip_path: false

plugins:
  - name: rate-limiting
    config:
      minute: 120
      policy: local
