# Docker Swarm production skeleton
# docker swarm init && docker stack deploy -c docker-stack.yml shopflow

version: "3.8"

services:
  edge-nginx:
    image: shopflow/edge-nginx:latest
    ports:
      - "80:8080"
      - "443:8443"
    environment:
      BACKEND: http://kong:8000
      MODSEC_RULE_ENGINE: On
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
    networks:
      - shopflow_dmz

  kong:
    image: kong:3.7
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_JWT_AUD: shopflow-api
    configs:
      - source: kong_yml
        target: /etc/kong/kong.yml
    deploy:
      replicas: 2
      placement:
        constraints: [node.role == manager]
    networks:
      - shopflow_dmz
      - shopflow_private

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
    networks:
      - shopflow_private

  internal-mtls-proxy:
    image: shopflow/internal-mtls-proxy:latest
    ports:
      - "9443:9443"
    configs:
      - source: internal_mtls_conf
        target: /etc/nginx/conf.d/default.conf
    secrets:
      - source: billing_server_cert
        target: /etc/nginx/certs/server.crt
        mode: 0444
      - source: billing_server_key
        target: /etc/nginx/certs/server.key
        mode: 0400
      - source: billing_ca_cert
        target: /etc/nginx/certs/ca.crt
        mode: 0444
    deploy:
      replicas: 1
    networks:
      - shopflow_dmz
      - shopflow_private

  billing-mtls-proxy:
    image: nginx:1.27-alpine
    ports:
      - "8443:443"
    configs:
      - source: billing_mtls_conf
        target: /etc/nginx/conf.d/default.conf
      - source: billing_server_crt
        target: /etc/nginx/certs/server.crt
      - source: billing_server_key
        target: /etc/nginx/certs/server.key
      - source: billing_ca_crt
        target: /etc/nginx/certs/ca.crt
    deploy:
      replicas: 1
    networks:
      - shopflow_dmz
      - shopflow_private

  webhook-authorizer:
    image: shopflow/webhook-authorizer:latest
    environment:
      SHOPFLOW_ENV: production
      BILLING_INTERNAL_URL: http://billing-service:8080
      REDIS_URL: redis://redis:6379
      VAULT_REQUIRED: "true"
      VAULT_ADDR: http://vault:8200
    secrets:
      - vault_app_token
      - webhook_internal_secret
    deploy:
      replicas: 1
    networks:
      - shopflow_private

  keycloak-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD_FILE: /run/secrets/keycloak_db_password
    secrets:
      - keycloak_db_password
    deploy:
      replicas: 1
    networks:
      - shopflow_private

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.0
    command: start --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-db
      KC_HOSTNAME_STRICT: "true"
      KEYCLOAK_ADMIN_PASSWORD_FILE: /run/secrets/keycloak_admin_password
    secrets:
      - keycloak_admin_password
    ports:
      - "8080:8080"
    deploy:
      replicas: 2
    networks:
      - shopflow_private

  vault:
    image: hashicorp/vault:1.18
    command: server -config=/vault/config/config.hcl
    configs:
      - source: vault_hcl
        target: /vault/config/config.hcl
    volumes:
      - vault-data:/vault/file
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
    networks:
      - shopflow_private

  app-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: shopflow
      POSTGRES_USER: shopflow_app
      POSTGRES_PASSWORD_FILE: /run/secrets/app_db_password
    secrets:
      - app_db_password
    deploy:
      replicas: 1
    volumes:
      - app-db-data:/var/lib/postgresql/data
    networks:
      - shopflow_data

  order-service:
    image: shopflow/order-service:latest
    command:
      - sh
      - -c
      - 'export VAULT_TOKEN="$(cat /run/secrets/vault_app_token)" DATABASE_URL="postgres://shopflow_app:$(cat /run/secrets/app_db_password)@app-db:5432/shopflow" && exec node server.js'
    environment:
      SHOPFLOW_ENV: production
      REDIS_URL: redis://redis:6379
      VAULT_ADDR: http://vault:8200
      VAULT_DB_REQUIRED: "true"
    secrets:
      - app_db_password
      - vault_app_token
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        failure_action: rollback
    networks:
      - shopflow_private
      - shopflow_data

  user-service:
    image: shopflow/user-service:latest
    environment:
      SHOPFLOW_ENV: production
      REDIS_URL: redis://redis:6379
    deploy:
      replicas: 2
    networks:
      - shopflow_private

  billing-service:
    image: shopflow/billing-service:latest
    environment:
      SHOPFLOW_ENV: production
      REDIS_URL: redis://redis:6379
      VAULT_REQUIRED: "true"
      VAULT_ADDR: http://vault:8200
    secrets:
      - vault_app_token
      - webhook_internal_secret
    deploy:
      replicas: 2
    networks:
      - shopflow_private

  auth-service:
    image: shopflow/auth-service:latest
    environment:
      SHOPFLOW_ENV: production
      REDIS_URL: redis://redis:6379
    deploy:
      replicas: 2
    networks:
      - shopflow_private

  loki:
    image: grafana/loki:3.0.0
    command: -config.file=/etc/loki/local-config.yaml
    configs:
      - source: loki_yml
        target: /etc/loki/local-config.yaml
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
    networks:
      - shopflow_private

  promtail:
    image: grafana/promtail:3.0.0
    command: -config.file=/etc/promtail/config.yml
    configs:
      - source: promtail_yml
        target: /etc/promtail/config.yml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      mode: global
    networks:
      - shopflow_private

  prometheus:
    image: prom/prometheus:v2.54.1
    configs:
      - source: prometheus_yml
        target: /etc/prometheus/prometheus.yml
      - source: alerts_yml
        target: /etc/prometheus/alerts.yml
      - source: recording_rules_yml
        target: /etc/prometheus/recording_rules.yml
    deploy:
      replicas: 1
    networks:
      - shopflow_private

  alertmanager:
    image: prom/alertmanager:v0.27.0
    configs:
      - source: alertmanager_yml
        target: /etc/alertmanager/alertmanager.yml
    deploy:
      replicas: 1
    networks:
      - shopflow_private

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
    secrets:
      - grafana_admin_password
    deploy:
      replicas: 1
    ports:
      - "3000:3000"
    networks:
      - shopflow_private

configs:
  kong_yml:
    file: ./kong/kong.yml
  loki_yml:
    file: ./loki/loki-config.yml
  promtail_yml:
    file: ./promtail/promtail-config.yml
  prometheus_yml:
    file: ./observability/prometheus.yml
  alerts_yml:
    file: ./observability/alerts.yml
  recording_rules_yml:
    file: ./observability/recording_rules.yml
  alertmanager_yml:
    file: ./observability/alertmanager.yml
  billing_mtls_conf:
    file: ./nginx/billing-mtls.conf
  internal_mtls_conf:
    file: ./nginx/internal-mtls.conf
  vault_hcl:
    file: ./vault/config.hcl
  billing_server_crt:
    file: ./certs/server.crt
  billing_server_key:
    file: ./certs/server.key
  billing_ca_crt:
    file: ./certs/ca.crt

secrets:
  keycloak_db_password:
    external: true
  keycloak_admin_password:
    external: true
  app_db_password:
    external: true
  vault_app_token:
    external: true
  webhook_internal_secret:
    external: true
  grafana_admin_password:
    external: true

volumes:
  vault-data:
    driver: local
  app-db-data:
    driver: local

networks:
  shopflow_dmz:
    driver: overlay
  shopflow_private:
    driver: overlay
  shopflow_data:
    driver: overlay
