services:
  edge-nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: edge-nginx
    ports:
      - "80:8080"
      - "443:8443"
    environment:
      BACKEND: http://kong:8000
      MODSEC_RULE_ENGINE: On
      PORT: 8080
      SSL_PORT: 8443
      SERVER_NAME: localhost
    volumes:
      - ./certs/server.crt:/etc/nginx/conf/server.crt:ro
      - ./certs/server.key:/etc/nginx/conf/server.key:ro
      - ./nginx/modsecurity-custom.conf:/etc/modsecurity.d/owasp-crs/rules/REQUEST-900-EXCLUSION-RULES-BEFORE-CRS.conf:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/security-headers.conf:ro
    depends_on:
      - kong
    networks:
      - dmz

  internal-mtls-proxy:
    image: nginx:1.27-alpine
    container_name: internal-mtls-proxy
    ports:
      - "9443:9443"
    volumes:
      - ./nginx/internal-mtls.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - kong
    networks:
      - dmz
      - private

  billing-mtls-proxy:
    image: nginx:1.27-alpine
    container_name: billing-mtls-proxy
    ports:
      - "8443:443"
    volumes:
      - ./nginx/billing-mtls.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - kong
    networks:
      - dmz
      - private

  redis:
    image: redis:7-alpine
    container_name: redis
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - private

  webhook-authorizer:
    build:
      context: ../services
      dockerfile: webhook-authorizer/Dockerfile
    container_name: webhook-authorizer
    environment:
      PORT: 8080
      BILLING_INTERNAL_URL: http://billing-service:8080
      WEBHOOK_INTERNAL_SECRET: ${WEBHOOK_INTERNAL_SECRET:-lab-webhook-internal-secret-change-me}
      HMAC_SECRET: ${HMAC_SECRET:-lab-hmac-secret-change-me}
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_APP_TOKEN:-${VAULT_ROOT_TOKEN:-}}
      VAULT_REQUIRED: ${VAULT_REQUIRED:-false}
      REDIS_URL: redis://redis:6379
      SHOPFLOW_ENV: ${SHOPFLOW_ENV:-lab}
    depends_on:
      - redis
      - vault
      - billing-service
    networks:
      - private

  kong:
    image: kong:3.7
    container_name: kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_JWT_AUD: ${KEYCLOAK_AUDIENCE:-shopflow-api}
    volumes:
      - ./kong/kong.yml:/etc/kong/kong.yml:ro
    ports:
      - "127.0.0.1:8001:8001"
    depends_on:
      - redis
      - order-service
      - user-service
      - billing-service
      - auth-service
      - webhook-authorizer
    networks:
      - dmz
      - private

  keycloak-db:
    image: postgres:16-alpine
    container_name: keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    networks:
      - private

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.0
    container_name: keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-db
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8080
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_BACKCHANNEL: "false"
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
    depends_on:
      - keycloak-db
    ports:
      - "8080:8080"
    networks:
      - private

  app-db:
    image: postgres:16-alpine
    container_name: app-db
    environment:
      POSTGRES_DB: shopflow
      POSTGRES_USER: shopflow_app
      POSTGRES_PASSWORD: ${DB_PASSWORD:-shopflow_app}
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - app-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopflow_app -d shopflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - data

  vault:
    image: hashicorp/vault:1.18
    container_name: vault
    entrypoint: ["vault"]
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_ADDR: http://127.0.0.1:8200
      VAULT_API_ADDR: http://vault:8200
    command: ["server", "-config=/vault/config/config.hcl"]
    ports:
      - "8200:8200"
    volumes:
      - ./vault/config.hcl:/vault/config/config.hcl:ro
      - vault-data:/vault/file
    networks:
      - private
    healthcheck:
      test: ["CMD", "sh", "-c", "vault status -address=http://127.0.0.1:8200"]
      interval: 10s
      timeout: 5s
      retries: 5

  order-service:
    build:
      context: ../services
      dockerfile: order-service/Dockerfile
    container_name: order-service
    environment:
      PORT: 8080
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_APP_TOKEN:-${VAULT_ROOT_TOKEN:-}}
      VAULT_DB_REQUIRED: ${VAULT_DB_REQUIRED:-false}
      DB_PASSWORD: ${DB_PASSWORD:-shopflow_app}
      KEYCLOAK_ISSUERS: http://keycloak:8080/realms/shopflow,http://localhost:8080/realms/shopflow
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/shopflow/protocol/openid-connect/certs
      TENANT_RATE_LIMIT_RPM: ${TENANT_RATE_LIMIT_RPM:-120}
      REDIS_URL: redis://redis:6379
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE:-shopflow-api}
      KEYCLOAK_M2M_CLIENT_ID: ${KEYCLOAK_M2M_CLIENT_ID:-shopflow-s2s}
      KEYCLOAK_M2M_CLIENT_SECRET: ${KEYCLOAK_M2M_CLIENT_SECRET:-shopflow-s2s-secret-change-in-prod}
      KEYCLOAK_M2M_SCOPE: ${KEYCLOAK_M2M_SCOPE:-shopflow-api}
      KEYCLOAK_TOKEN_URL: http://keycloak:8080/realms/shopflow/protocol/openid-connect/token
      USER_INTERNAL_URL: http://user-service:8080
      SHOPFLOW_ENV: ${SHOPFLOW_ENV:-lab}
    depends_on:
      app-db:
        condition: service_healthy
      keycloak:
        condition: service_started
      redis:
        condition: service_healthy
      vault:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - private
      - data

  user-service:
    build:
      context: ../services
      dockerfile: user-service/Dockerfile
    container_name: user-service
    environment:
      PORT: 8080
      KEYCLOAK_ISSUERS: http://keycloak:8080/realms/shopflow,http://localhost:8080/realms/shopflow
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/shopflow/protocol/openid-connect/certs
      SSRF_ALLOWLIST: cdn.shopflow.local,imgur.com
      REDIS_URL: redis://redis:6379
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE:-shopflow-api}
      KEYCLOAK_M2M_CLIENT_ID: ${KEYCLOAK_M2M_CLIENT_ID:-shopflow-s2s}
      KEYCLOAK_M2M_CLIENT_SECRET: ${KEYCLOAK_M2M_CLIENT_SECRET:-shopflow-s2s-secret-change-in-prod}
      SHOPFLOW_ENV: ${SHOPFLOW_ENV:-lab}
    depends_on:
      - keycloak
      - redis
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - private

  billing-service:
    build:
      context: ../services
      dockerfile: billing-service/Dockerfile
    container_name: billing-service
    environment:
      PORT: 8080
      HMAC_SECRET: ${HMAC_SECRET:-lab-hmac-secret-change-me}
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_APP_TOKEN:-${VAULT_ROOT_TOKEN:-}}
      VAULT_REQUIRED: ${VAULT_REQUIRED:-false}
      TENANT_RATE_LIMIT_RPM: ${TENANT_RATE_LIMIT_RPM:-120}
      REDIS_URL: redis://redis:6379
      WEBHOOK_INTERNAL_SECRET: ${WEBHOOK_INTERNAL_SECRET:-lab-webhook-internal-secret-change-me}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE:-shopflow-api}
      KEYCLOAK_M2M_CLIENT_ID: ${KEYCLOAK_M2M_CLIENT_ID:-shopflow-s2s}
      KEYCLOAK_M2M_CLIENT_SECRET: ${KEYCLOAK_M2M_CLIENT_SECRET:-shopflow-s2s-secret-change-in-prod}
      SHOPFLOW_ENV: ${SHOPFLOW_ENV:-lab}
    depends_on:
      - vault
      - redis
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - private

  auth-service:
    build:
      context: ../services
      dockerfile: auth-service/Dockerfile
    container_name: auth-service
    environment:
      PORT: 8080
      KEYCLOAK_TOKEN_URL: http://keycloak:8080/realms/shopflow/protocol/openid-connect/token
      KEYCLOAK_CLIENT_ID: shopflow-spa
      KEYCLOAK_M2M_CLIENT_ID: ${KEYCLOAK_M2M_CLIENT_ID:-shopflow-s2s}
      KEYCLOAK_M2M_CLIENT_SECRET: ${KEYCLOAK_M2M_CLIENT_SECRET:-shopflow-s2s-secret-change-in-prod}
      KEYCLOAK_M2M_SCOPE: ${KEYCLOAK_M2M_SCOPE:-shopflow-api}
      REDIS_URL: redis://redis:6379
      SHOPFLOW_ENV: ${SHOPFLOW_ENV:-lab}
    depends_on:
      - keycloak
      - redis
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - private

  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    networks:
      - private

  promtail:
    image: grafana/promtail:3.0.0
    container_name: promtail
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - private

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/alerts.yml:/etc/prometheus/alerts.yml:ro
      - ./observability/recording_rules.yml:/etc/prometheus/recording_rules.yml:ro
    ports:
      - "9090:9090"
    networks:
      - private

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    volumes:
      - ./observability/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    networks:
      - private

  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/etc/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - private

networks:
  dmz:
  private:
  data:

volumes:
  loki-data:
  vault-data:
  app-db-data:
