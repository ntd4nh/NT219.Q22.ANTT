# Security headers snippet cho owasp/modsecurity-crs:nginx-alpine edge container.
# File này được mount vào /etc/nginx/conf.d/security-headers.conf trong container.
# Image đó include conf.d/*.conf bên trong server block nên add_header có tác dụng.
# Tham chiếu: https://github.com/coreruleset/modsecurity-docker

add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "no-referrer-when-downgrade" always;
add_header X-Request-ID $request_id always;
